[workspace]
resolver = "3"
members = [
    "jose-core",
    "jose-json",
]

[workspace.dependencies]
jose-core = { path = "jose-core", version = "0.1.0" }
jose-json = { path = "jose-json", version = "0.1.0" }
base64ct = { version = "1", default-features = false, features = ["alloc"] }
jiff = { version = "0.2" }
serde = { version = "1", default-features = false, features = ["derive"] }
serde_json = { version = "1", default-features = false, features = ["alloc", "raw_value"] }
